<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Historical Timeline Viewer Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        @font-face {
            font-family: 'NeueHaasUnicaPro';
            src: url('NeueHaasUnicaPro-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        :root { 
            --axis-bg: #000; 
            --text-color: #ddd;
            --line-color: #ddd;
            --header-height: 80px;
            /* --font-main: 'Crimson Text', "Times New Roman", serif; */
            --font-main: 'NeueHaasUnicaPro', Helvetica, Arial, sans-serif;
            --accent-color: #ddd;
        }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #000; 
            font-family: var(--font-main); 
        }
        
        #main-layout {
            display: grid;
            grid-template-columns: 90px 1fr; 
            grid-template-rows: var(--header-height) 35px 1fr 15vh; 
            width: 100vw;
            height: 100vh;
        }

        #header {
            grid-column: 1 / span 2;
            grid-row: 1;
            display: flex;
            align-items: baseline;
            padding: 20px 80px;
            border-bottom: 2px solid var(--accent-color);
            background: #000;
            z-index: 102;
        }

        #header h1 {
            margin: 0;
            font-family: var(--font-main);
            font-size: 38px;
            font-weight: 900;
            color: #ddd;
            margin-right: 30px;
            letter-spacing: 0.5px;
        }

        #header p {
            margin: 0;
            font-size: 20px;
            color:  #ddd
        }

        #top-axis { 
            grid-column: 2; 
            background: var(--axis-bg); 
            position: relative; 
            z-index: 1000;
            overflow: visible; 
            display: flex;
            align-items: center; 
            border-bottom: 1px solid var(--line-color)
        }

        #left-axis { 
            grid-column: 1;
            grid-row: 3; 
            background: var(--axis-bg); 
            position: relative; 
            z-index: 100;
        }

        #corner { 
            grid-column: 1;
            grid-row: 2;
            background: #000; 
            z-index: 101;
        }
        canvas {
            outline: none;
        }

        #viewer-container {
            grid-column: 2;
            grid-row: 3;
            background: #000;
            position: relative;
            outline: none !important;
        }
        #viewer-container :focus {
            outline: none !important;
        }

        #bottom-nav-row {
            grid-column: 1 / span 2;
            grid-row: 4;
            background: #000;
            border-top: 1px solid var(--line-color);
            display: flex; 
            justify-content: flex-start;
            align-items: center;
            padding-left: 10px;
        }

        .axis-label {
            position: absolute; 
            color: var(--text-color); 
            font-family: var(--font-main);
            white-space: nowrap;
            pointer-events: auto; 
            user-select: text;
        }
        
        .year-label { 
            right: 20px; 
            line-height: 1; 
            font-size: 19px;
        }
        
        .cat-label { 
            padding-left: 5px;
            border-left: 2px solid var(--line-color);
            font-size: 13px;
        }
    #bottom-nav-row {
        position: relative;
        grid-column: 1 / span 2;
        grid-row: 4;
        background: #000;
        border-top: 1px solid var(--line-color);
        width: 100%;
        height: 15vh; 
        margin: 0;
        padding: 0;
    }

    #navigator-box {
        position: absolute;
        left: 3%;       
        top: 50%;         
        transform: translateY(-50%); 
        
        height: 85% !important; 
        width: auto; 
        max-width: 25vw;
        aspect-ratio: 19583 / 15000;
        overflow: hidden;
    }

    #right-bottom-img {
        position: absolute; 
        right: 3%;        
        top: 50%;         
        transform: translateY(-50%); 
        height: 85%;    
        width: auto;
        display: block;
    }
        @media (max-width: 767px) {
            #main-layout {
                grid-template-rows: 100px 40px 1fr 0px; 
            }

            #header {
                flex-direction: column;
                align-items: flex-start;
                justify-content: center;
                padding: 10px 20px;
            }


            #header h1 {
                font-size: 24px;
                margin-bottom: 4px;
                font-weight: bold;
            }

            #header p {
                font-size: 14px;
                color: #666;
            }

            #left-axis { width: 45px; }
            .year-label { font-size: 14px; right: 8px; }
            .cat-label { font-size: 12px; }
        }
    </style>
</head>
<body>

<div id="main-layout">
    <div id="header">
        <h1>A Timetable of History</h1>
        <p>A Horizontal Linked History Page</p>
    </div>

    <div id="corner"></div>
    <div id="top-axis"></div>
    <div id="left-axis"></div>
    <div id="viewer-container"></div>
    <div id="bottom-nav-row">
        <div id="navigator-box"></div>
        <img src="right_bottom.png" id="right-bottom-img" alt="History Details">
    </div>
</div>

<script>
    const isMobile = window.innerWidth < 768;
    console.log(window.innerWidth)
    const timelineData = {
         years: [
            { label: "1501", y: 0.08 },
            { label: "1502", y: 0.22 },
            { label: "1503", y: 0.37 },
            { label: "1504", y: 0.51 },
            { label: "1505", y: 0.65 }
        ],

        categories: [
            { label: "History / Politic", x: 0.005 },
            { label: "Literature / Theater", x: 0.188 },
            { label: "Visual Arts", x: 0.326 },
            { label: "Religion, Philosophy, Learning", x: 0.465 },
            { label: "Science/Technology/Growth", x: 0.603 },
            { label: "Music", x: 0.740 },
            { label: "Science", x: 0.832 }
        ]
    };

    const viewer = OpenSeadragon({
        id: "viewer-container",
        prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
        tileSources: 'THESIS_ouput.dzi',
        
        animationTime: 1.0,
        springStiffness: 12,
        visibilityRatio: 1.0,
        constrainDuringPan: true,
        defaultZoomLevel: isMobile ? 5 : 2,
        minZoomImageRatio: isMobile ? 0.8 : 0.4,
        autoResize: true, 
        navigatorTileSources: {
            type: 'image',
            url: 'THESIS.png' 
        },
        gestureSettingsTouch: {
            pinchRotate: false,
            clickToZoom: true,
            dblClickToZoom: true,
            flickEnabled: true
        },
        showNavigationControl: false,
        showNavigator: !isMobile,
        navigatorId: isMobile ? null : "navigator-box",
        navigatorDisplayRegionColor: '#d4af37',
        navigatorBorderColor: '#d4af37',                
        navigatorDisplayRegionBorderWidth: 2,            
    });

    const leftAxis = document.getElementById('left-axis');
    const topAxis = document.getElementById('top-axis');

    function initLabels() {
        leftAxis.innerHTML = '';
        topAxis.innerHTML = '';

        timelineData.years.forEach(d => {
            const div = document.createElement('div');
            div.className = 'axis-label year-label';
            div.innerText = d.label;
            leftAxis.appendChild(div);
            d.el = div;
        });

        timelineData.categories.forEach(d => {
            const div = document.createElement('div');
            div.className = 'axis-label cat-label';
            div.innerText = d.label;
            topAxis.appendChild(div);
            d.el = div;
        });
    }

    function updateAxis() {
        if (!viewer.viewport) return;
        const viewport = viewer.viewport;
        const bounds = viewport.getBounds();
        let newX = bounds.x;
        let newY = bounds.y;
        let changed = false;
        if (bounds.x < 0) {
            newX = 0;
            changed = true;
        }
        if (bounds.y < 0) {
            newY = 0;
            changed = true;
        }
        
        if (changed) {
            viewport.fitBounds(new OpenSeadragon.Rect(newX, newY, bounds.width, bounds.height), false);
            // viewport.applyConstraints(); 
        }
        window.requestAnimationFrame(() => {
            timelineData.years.forEach(d => {
                if (d.el) { 
                    const imgPoint = new OpenSeadragon.Point(0, d.y);
                    const pixelPoint = viewport.pixelFromPoint(imgPoint, true);
                    d.el.style.transform = `translateY(${pixelPoint.y}px)`;
                    d.el.style.display = (pixelPoint.y < -30 || pixelPoint.y > leftAxis.offsetHeight) ? 'none' : 'block';
                }
            });

            timelineData.categories.forEach(d => {
                if (d.el) {
                    const imgPoint = new OpenSeadragon.Point(d.x, 0);
                    const pixelPoint = viewport.pixelFromPoint(imgPoint, true);
                    d.el.style.transform = `translateX(${pixelPoint.x}px)`;
                    d.el.style.display = (pixelPoint.x < -100 || pixelPoint.x > topAxis.offsetWidth + 10) ? 'none' : 'block';
                }
            });
        });
    }

    viewer.addHandler('open', () => {
        initLabels();
        
        const viewport = viewer.viewport;
        
        

        setTimeout(() => {
            viewer.viewport.setCanvasSize();
        }, 100);

        const containerAspect = viewport.getAspectRatio();
        if (isMobile) {
            const initialView = new OpenSeadragon.Rect(0, 0, 0.2, 0.2);
            viewport.fitBounds(initialView, true);
        } else {
            const containerAspect = viewer.viewport.getAspectRatio();
            viewer.viewport.fitBounds(new OpenSeadragon.Rect(0, 0, 1, 1 / containerAspect), true);
        }
        
        updateAxis();
    });

    viewer.addHandler('animation', updateAxis);
    viewer.addHandler('canvas-scroll', updateAxis);
    viewer.addHandler('canvas-drag', updateAxis);
    viewer.addHandler('viewport-change', updateAxis);
    window.addEventListener('resize', updateAxis);

</script>
</body>
</html>
